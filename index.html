<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siggy — Ritual AI Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #060810;
  --surface: rgba(255,255,255,0.05);
  --surface2: rgba(255,255,255,0.09);
  --border: rgba(255,255,255,0.1);
  --border-glow: rgba(99,179,255,0.3);
  --text: #ffffff;
  --text-dim: rgba(255,255,255,0.75);
  --text-muted: rgba(255,255,255,0.4);
  --accent: #4f9eff;
  --accent2: #7b68ee;
  --gold: #d4b87a;
}

* { box-sizing:border-box; margin:0; padding:0; }
html, body {
  height:100%;
  font-family:'Sora',sans-serif;
  background:var(--bg);
  color:var(--text);
  /* allow scroll on mobile */
  overflow-x:hidden;
}

/* ── CANVAS ── */
#bg-canvas { position:fixed; inset:0; z-index:0; pointer-events:none; }

/* ── NOISE ── */
body::before { content:''; position:fixed; inset:0; z-index:1; pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity:.025; }

/* ── ORBS ── */
.orb { position:fixed; z-index:0; border-radius:50%; filter:blur(80px); pointer-events:none; animation:orbFloat 12s ease-in-out infinite; }
.orb-1 { width:500px;height:500px;background:radial-gradient(circle,rgba(79,158,255,.13),transparent 70%);top:-100px;left:-80px;animation-delay:0s; }
.orb-2 { width:400px;height:400px;background:radial-gradient(circle,rgba(123,104,238,.11),transparent 70%);bottom:-60px;right:-80px;animation-delay:-4s; }
.orb-3 { width:300px;height:300px;background:radial-gradient(circle,rgba(200,169,110,.07),transparent 70%);top:40%;left:60%;animation-delay:-8s; }
@keyframes orbFloat { 0%,100%{transform:translate(0,0) scale(1);} 33%{transform:translate(20px,-20px) scale(1.05);} 66%{transform:translate(-15px,15px) scale(.97);} }

/* ══════════════════════════════
   NAVBAR
══════════════════════════════ */
#navbar {
  position:fixed; top:0; left:0; right:0; z-index:100;
  height:58px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
  background:rgba(6,8,16,0.85);
  backdrop-filter:blur(20px) saturate(160%);
  border-bottom:1px solid var(--border);
  animation:slideDown .6s cubic-bezier(.16,1,.3,1) both;
}
@keyframes slideDown { from{transform:translateY(-100%);opacity:0;} to{transform:translateY(0);opacity:1;} }

.nav-left { display:flex; align-items:center; gap:8px; flex-shrink:0; }
.nav-logo { width:28px; height:28px; border-radius:7px; object-fit:cover; box-shadow:0 0 10px rgba(79,158,255,.3); }
.nav-brand { font-size:14px; font-weight:600; color:#fff; }
.nav-div { width:1px; height:16px; background:rgba(255,255,255,0.15); margin:0 4px; }

.nav-socials { display:flex; align-items:center; gap:1px; }
.nav-socials a { display:flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:6px; color:rgba(255,255,255,0.9); text-decoration:none; transition:color .15s,background .15s; }
.nav-socials a:hover { color:#fff; background:rgba(79,158,255,.15); }
.nav-socials svg { width:14px; height:14px; }

/* Center status */
.nav-center {
  position:absolute; left:50%; transform:translateX(-50%);
  display:flex; align-items:center; gap:8px;
}
.status-pill { display:flex; align-items:center; gap:5px; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.1); border-radius:100px; padding:3px 10px; font-size:10.5px; font-weight:500; letter-spacing:.3px; color:rgba(255,255,255,0.8); white-space:nowrap; }
.status-dot { width:5px; height:5px; border-radius:50%; background:#22c55e; box-shadow:0 0 5px #22c55e; flex-shrink:0; }
.pill-sep { width:1px; height:12px; background:rgba(255,255,255,0.12); }
#clock { font-family:'DM Mono',monospace; font-size:10.5px; color:rgba(255,255,255,0.7); }

.nav-right { display:flex; align-items:center; gap:1px; flex-shrink:0; }
.nav-link { font-size:10.5px; font-weight:500; letter-spacing:1px; text-transform:uppercase; color:rgba(255,255,255,0.85); text-decoration:none; padding:6px 10px; border-radius:7px; position:relative; transition:color .15s,background .15s; }
.nav-link::after { content:''; position:absolute; bottom:3px; left:10px; right:10px; height:1px; background:var(--accent); transform:scaleX(0); transform-origin:center; transition:transform .2s; }
.nav-link:hover { color:#fff; background:rgba(79,158,255,.08); }
.nav-link:hover::after { transform:scaleX(1); }

/* Hide center status + some nav links on small screens */
@media(max-width:768px){
  .nav-center { display:none; }
  .nav-link { padding:5px 7px; font-size:9.5px; }
  .nav-brand { display:none; }
}
@media(max-width:480px){
  .nav-right .nav-link:nth-child(n+4){ display:none; }
}

/* ══════════════════════════════
   PAGE LAYOUT
══════════════════════════════ */
#page {
  position:relative; z-index:2;
  min-height:100vh;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  padding:80px 16px 40px; /* top clears navbar */
}

/* ── LOGO ── */
.hero-logo-wrap {
  position:relative; margin-bottom:18px;
  opacity:0; animation:fadeUp .7s .1s cubic-bezier(.16,1,.3,1) forwards;
}
.hero-logo { width:72px; height:72px; border-radius:18px; object-fit:cover; box-shadow:0 0 0 1px rgba(255,255,255,0.12),0 14px 44px rgba(79,158,255,.22); }
.logo-ring { position:absolute; inset:-7px; border:1px solid rgba(79,158,255,.18); border-radius:25px; animation:logoRing 4s linear infinite; }
.logo-ring-2 { position:absolute; inset:-14px; border:1px solid rgba(79,158,255,.08); border-radius:32px; animation:logoRing 6s linear infinite reverse; }
@keyframes logoRing { 0%{transform:rotate(0deg);opacity:.8;} 50%{opacity:.3;} 100%{transform:rotate(360deg);opacity:.8;} }

/* ── TITLE ── */
.hero-title {
  font-size:clamp(32px,6vw,48px); font-weight:700; letter-spacing:-1.5px; text-align:center;
  background:linear-gradient(135deg,#ffffff 30%,rgba(79,158,255,.9) 65%,#a08fff 100%);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  margin-bottom:7px;
  opacity:0; animation:fadeUp .7s .2s cubic-bezier(.16,1,.3,1) forwards;
}
.hero-sub {
  font-family:'DM Mono',monospace; font-size:10.5px; font-weight:300;
  letter-spacing:3px; text-transform:uppercase; color:var(--gold);
  margin-bottom:28px; text-align:center;
  opacity:0; animation:fadeUp .7s .28s cubic-bezier(.16,1,.3,1) forwards;
}

/* ══════════════════════════════
   CHAT AREA — bigger box
══════════════════════════════ */
.chat-wrap {
  width:100%; max-width:720px;
  opacity:0; animation:fadeUp .7s .36s cubic-bezier(.16,1,.3,1) forwards;
}

/* Message list — taller */
.chat-messages {
  display:flex; flex-direction:column; gap:12px;
  min-height:180px;      /* visible even when empty */
  max-height:340px;      /* taller scroll area */
  overflow-y:auto;
  margin-bottom:14px; padding:16px; padding-right:12px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.08);
  border-radius:18px;
  scrollbar-width:thin; scrollbar-color:rgba(79,158,255,.25) transparent;
}
/* hide empty box until first message */
.chat-messages:empty { display:none; }

.msg {
  padding:12px 16px; border-radius:14px;
  font-size:14px; line-height:1.65; max-width:88%;
  color:#ffffff; word-break:break-word;
}
.msg.user { align-self:flex-end; background:linear-gradient(135deg,rgba(79,158,255,.18),rgba(123,104,238,.12)); border:1px solid rgba(79,158,255,.25); }
.msg.ai   { align-self:flex-start; background:rgba(255,255,255,.05); border:1px solid rgba(255,255,255,.1); }

.typing-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:var(--accent); margin:0 2px; animation:typingBounce 1.2s ease-in-out infinite; }
.typing-dot:nth-child(2){animation-delay:.2s;} .typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes typingBounce { 0%,100%{transform:translateY(0);opacity:.4;} 50%{transform:translateY(-5px);opacity:1;} }

/* ── INPUT ── */
.input-shell {
  position:relative; background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.14); border-radius:18px;
  display:flex; align-items:flex-end;
  padding:16px 14px 16px 20px;
  transition:border-color .2s,box-shadow .2s;
}
.input-shell::before { content:''; position:absolute; inset:0; border-radius:18px; background:linear-gradient(135deg,rgba(79,158,255,0.04),transparent); pointer-events:none; }
.input-shell:focus-within { border-color:var(--border-glow); box-shadow:0 0 0 3px rgba(79,158,255,0.08),0 8px 40px rgba(0,0,0,.4); }

.input-shell textarea {
  flex:1; background:transparent; border:none; outline:none; resize:none;
  color:#fff; font-family:'Sora',sans-serif; font-size:15px; line-height:1.55;
  min-height:28px; max-height:160px; overflow-y:auto;
}
.input-shell textarea::placeholder { color:rgba(255,255,255,0.32); }

.input-actions { display:flex; align-items:flex-end; margin-left:12px; padding-bottom:2px; }
.send-btn {
  width:40px; height:40px; border:none; border-radius:12px; flex-shrink:0;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#fff; display:flex; align-items:center; justify-content:center;
  cursor:pointer; transition:transform .15s,box-shadow .15s;
  box-shadow:0 4px 16px rgba(79,158,255,.3);
}
.send-btn:hover { transform:translateY(-1px); box-shadow:0 6px 24px rgba(79,158,255,.45); }
.send-btn:active { transform:scale(.94); }

/* ── CHIPS ── */
.suggestions {
  display:flex; gap:8px; flex-wrap:wrap; margin-top:13px; justify-content:center;
  opacity:0; animation:fadeUp .7s .46s cubic-bezier(.16,1,.3,1) forwards;
}
.chip {
  font-size:12px; font-weight:500; color:#ffffff;
  background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.15);
  border-radius:100px; padding:5px 14px; cursor:pointer;
  transition:color .15s,border-color .15s,background .15s; white-space:nowrap;
}
.chip:hover { border-color:rgba(79,158,255,.4); background:rgba(79,158,255,.1); }

/* ── FOOTER ── */
.hero-footer {
  margin-top:22px; display:flex; align-items:center; gap:7px;
  font-size:13px; color:rgba(255,255,255,0.6);
  opacity:0; animation:fadeUp .7s .54s cubic-bezier(.16,1,.3,1) forwards;
}
.hero-footer a { color:#ffffff; text-decoration:none; font-weight:500; display:flex; align-items:center; gap:5px; transition:color .15s; }
.hero-footer a:hover { color:var(--accent); }

@keyframes fadeUp { from{opacity:0;transform:translateY(14px);} to{opacity:1;transform:translateY(0);} }
::-webkit-scrollbar{width:4px;} ::-webkit-scrollbar-track{background:transparent;} ::-webkit-scrollbar-thumb{background:rgba(79,158,255,.25);border-radius:4px;}

/* ── MOBILE ── */
@media(max-width:600px){
  .hero-logo { width:60px; height:60px; }
  .hero-sub { letter-spacing:2px; }
  .chip { font-size:11px; padding:4px 11px; }
  .msg { font-size:13.5px; }
  .input-shell textarea { font-size:14px; }
  .chat-messages { min-height:140px; max-height:260px; }
}
</style>

<script>
/* ── CLOCK ── */
function tick(){ document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',hour12:false})+' UTC'; }
setInterval(tick,1000); tick();

/* ── CANVAS PARTICLES ── */
const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
let P=[];
function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
window.addEventListener('resize',resize); resize();
function mkP(){
  return { x:Math.random()*canvas.width, y:Math.random()*canvas.height,
    vx:(Math.random()-.5)*.3, vy:(Math.random()-.5)*.3,
    r:Math.random()*1.6+.9, a:Math.random()*.55+.35 };
}
for(let i=0;i<88;i++) P.push(mkP());
(function frame(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  for(let i=0;i<P.length;i++){
    const p=P[i];
    p.x+=p.vx; p.y+=p.vy;
    if(p.x<0||p.x>canvas.width)p.vx*=-1;
    if(p.y<0||p.y>canvas.height)p.vy*=-1;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle=`rgba(100,175,255,${p.a})`; ctx.shadowColor='#5ab0ff'; ctx.shadowBlur=12; ctx.fill(); ctx.shadowBlur=0;
    for(let j=i+1;j<P.length;j++){
      const q=P[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<150){ ctx.strokeStyle=`rgba(100,175,255,${(1-d/150)*.28})`; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(p.x,p.y); ctx.lineTo(q.x,q.y); ctx.stroke(); }
    }
  }
  requestAnimationFrame(frame);
})();

/* ── STRIP MARKDOWN ── */
function stripMd(text){
  return text
    .replace(/\*\*(.+?)\*\*/g,'$1')   // **bold**
    .replace(/\*(.+?)\*/g,'$1')        // *italic*
    .replace(/`(.+?)`/g,'$1')          // `code`
    .replace(/#{1,6}\s/g,'')           // headings
    .replace(/^\s*[-*+]\s/gm,'• ')     // bullets → •
    .replace(/\n{3,}/g,'\n\n')         // excess newlines
    .trim();
}

/* ── CHAT ── */
const chatEl=document.getElementById('chat');
const inputEl=document.getElementById('input');
const sendBtn=document.getElementById('send');
const suggestionsEl=document.getElementById('suggestions');

function addMsg(text,role){
  const d=document.createElement('div');
  d.className='msg '+role;
  d.innerText= role==='ai' ? stripMd(text) : text;
  chatEl.appendChild(d);
  chatEl.scrollTop=chatEl.scrollHeight;
  return d;
}

function addTyping(){
  const d=document.createElement('div'); d.className='msg ai';
  d.innerHTML='<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  chatEl.appendChild(d); chatEl.scrollTop=chatEl.scrollHeight; return d;
}

async function send(text){
  const msg=(text||inputEl.value).trim();
  if(!msg) return;
  addMsg(msg,'user');
  inputEl.value=''; inputEl.style.height='28px';
  suggestionsEl.style.display='none';
  const t=addTyping();
  try{
    const r=await fetch('/api/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})});
    const data=await r.json(); t.remove(); addMsg(data.reply,'ai');
  }catch{ t.remove(); addMsg('Connection error. Please try again.','ai'); }
}

sendBtn.addEventListener('click',()=>send());
inputEl.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();} });
inputEl.addEventListener('input',()=>{
  inputEl.style.height='28px';
  inputEl.style.height=Math.min(inputEl.scrollHeight,160)+'px';
});
document.querySelectorAll('.chip').forEach(c=>c.addEventListener('click',()=>send(c.dataset.q)));
</script>
</body>
</html>
